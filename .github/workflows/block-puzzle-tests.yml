name: Block Puzzle tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: block-puzzle-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: Block_Puzzle_DocDD
    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
      PYTHONPATH: src/DocDD_coding

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Block_Puzzle_DocDD/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26"
          python -m pip install -r requirements.txt
          python -m pip install "ruff>=0.12,<1"

      - name: Check Python source
        run: |
          python -m compileall -q src tests
          ruff check src tests

      - name: Run tests
        run: >-
          python -m pytest
          tests/DocDD_coding
          src/DocDD_coding/test_tspin_lock_integration.py
          -q
