name: Repository quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check documentation and repository structure
        run: python scripts/check_repository.py
