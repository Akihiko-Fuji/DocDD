name: Results Record DB tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: results-record-db-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: results_record_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: results_record_db/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26"
          python -m pip install -r requirements.txt
          python -m pip install "ruff==0.15.22"

      - name: Check Python source
        run: |
          python -m compileall -q src tests sample_data/generate_sample_data.py
          ruff check src tests sample_data/generate_sample_data.py

      - name: Run tests
        run: python -m pytest -q
